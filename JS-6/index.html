<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignments – Chapter 31-38</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="nav-left">
        <span class="brand">Assignments</span>
        <span class="chapter-label">Chapter 31-38</span>
      </div>
      <div class="search-wrap">
        <input type="text" placeholder="Search" />
        <button>Search</button>
      </div>
    </nav>

    <main>
      <h1 class="page-title">
        Chapter # 31 - 38 | Date and Time, Passing them data and get data from them
      </h1>
      <hr class="divider" />

      <div class="row">
        <div class="col-left">
          <p class="section-title">Input</p>
          <div class="input-panel">
            <div class="input-field">
              <input type="datetime-local" id="input" />
              <button class="clear-btn" id="input-clear">Clear</button>
            </div>
          </div>
        </div>
        <div class="col-right">
          <p class="section-title">Original String</p>
          <div class="string-panel" id="original-string"></div>
        </div>
      </div>

      <div class="row">
        <div class="col-left">
          <p class="section-title">Buttons</p>
          <div class="buttons-panel">
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="today">Get Name of Today</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="born">Calculate Days Since I Born</button>
              </div>
            </div>
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="birthday">When Is Your Next Birthday</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="greet">Greet User</button>
              </div>
            </div>
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="time-1">Tell Time 1</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="time-2">Tell Time 2</button>
              </div>
            </div>
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="time-3">Tell Time 3</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="tax">Calculate Tax</button>
              </div>
            </div>
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="total">Calculate Total = Price + Tax</button>
              </div>
            </div>
          </div>
        </div>
        <div class="col-right">
          <p class="section-title">Output / Result</p>
          <div class="output-panel" id="output" style="display: flex; flex-direction: column; justify-content: center; align-items: center;"></div>
        </div>
      </div>

      <div class="clear-output-wrap">
        <button id="output-clear">Clear Output</button>
      </div>
    </main>

    <footer>&copy; 2026 | Designed By Anas| All Rights Reserved</footer>

    <script src="script.js"></script>
  </body>
</html>
