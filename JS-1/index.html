<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments - Chapter 1-7</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar top-navbar">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center">
                <span class="navbar-brand mb-0">Assignments</span>
                <span class="ms-3 text-white-50">Chapter 1 - 7</span>
            </div>
            <div class="d-flex">
                <input type="text" class="form-control me-2" placeholder="Search" style="width: 250px;">
                <button class="btn search-btn">Search</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="main-title">Chapter # 1 - 7 | Introduction to JavaScript | Data Types | Alert | Arithmetic Operators</h1>
        <hr style="border-top: 2px solid #a8b5b8; margin: 0 0 40px 0;">

        <div class="button-container text-center">
            <button class="btn btn-red" id="name">Alert Name</button>
            <button class="btn btn-red" id="number">Alert Number</button>
            <button class="btn btn-red" id="variables">Show Variable Names</button>
            <button class="btn btn-red" id="camelCase">Show camelCase Examples</button>
            <button class="btn btn-red" id="sum">Sum 2 Numbers</button>
            <button class="btn btn-red" id="subtract">Subtract 2 Numbers</button>
            <button class="btn btn-red" id="multiplication">Multiply 2 Numbers</button>
            <button class="btn btn-red" id="division">Divide 2 Numbers</button>
            <button class="btn btn-red" id="calculation">Calculate Some Numbers</button>
        </div>

        <h2 class="section-title">Original Statement</h2>
        <div class="output-box" id="outputStatement"></div>
        <div class="text-center mb-5">
            <button class="btn clear-btn" id="clear-statement">Clear Statement</button>
        </div>

        <h2 class="section-title">Output / Result</h2>
        <div class="output-box" id="output"></div>
        <div class="text-center">
            <button class="btn clear-btn" id="clear-output">Clear Output</button>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            &copy; 2026 | Designed by Anas | All Rights Reserved.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
