<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignments – Chapter 26-30</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="nav-left">
        <span class="brand">Assignments</span>
        <span class="chapter-label">Chapter 26-30</span>
      </div>
      <div class="search-wrap">
        <input type="text" placeholder="Search" />
        <button>Search</button>
      </div>
    </nav>

    <main>
      <h1 class="page-title">
        Chapter # 26 - 30 | Numbers, Integers & Decimals
      </h1>
      <hr class="divider" />

      <div class="row">
        <div class="col-left">
          <p class="section-title">Input</p>
          <div class="input-panel">
            <div class="input-field">
              <input type="text" placeholder="Type your text here" id="input" />
              <button class="clear-btn" id="input-clear">Clear</button>
            </div>
          </div>
        </div>
        <div class="col-right">
          <p class="section-title">Original String</p>
          <div class="string-panel" id="original-string" style="font-size: x-large;"><strong>25.12345</strong></div>
        </div>
      </div>

      <div class="row">
        <div class="col-left">
          <p class="section-title">Buttons</p>
          <div class="buttons-panel">
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="round">Round A Number</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="ceil">Ceil A Number</button>
              </div>
            </div>
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="floor">Floor A Number</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="random">Generate A Random Number</button>
              </div>
            </div>
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="dice">Throw A Dice</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="password">Generate A Strong Password</button>
              </div>
            </div>
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="convert-string">Convert A String</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="control-length">Controlling Length</button>
              </div>
            </div>
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="gst">Calculate GST</button>
              </div>
            </div>
          </div>
        </div>
        <div class="col-right">
          <p class="section-title">Output / Result</p>
          <div class="output-panel" id="output" style="display: flex; flex-direction: column; justify-content: center; align-items: center;"></div>
        </div>
      </div>

      <div class="clear-output-wrap">
        <button id="output-clear">Clear Output</button>
      </div>
    </main>

    <footer>&copy; 2026 | Designed By Anas| All Rights Reserved</footer>

    <script src="script.js"></script>
  </body>
</html>
