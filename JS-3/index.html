<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignments – Chapter 15-20</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="nav-left">
        <span class="brand">Assignments</span>
        <span class="chapter-label">Chapter 15 – 20</span>
      </div>
      <div class="search-wrap">
        <input type="text" placeholder="Search" />
        <button>Search</button>
      </div>
    </nav>

    <main>
      <h1 class="page-title">
        Chapter # 15 – 20 | Arrays: It's Methods &amp; for loops
      </h1>
      <hr class="divider" />

      <div class="row">
        <div class="col-left">
          <p class="section-title">Input</p>
          <div class="input-panel">
            <div class="input-field">
              <input type="text" placeholder="Type your text here" id="input" />
              <button class="clear-btn" id="input-clear">Clear</button>
            </div>
          </div>
        </div>
        <div class="col-right">
          <p class="section-title">Original String</p>
          <div class="string-panel">
            1) Faisalabad 2) Lahore 3) Karachi 4) Islamabad 5) Burewala 6)
            Sheikhupura 7) Kashmir
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-left">
          <p class="section-title">Buttons</p>
          <div class="buttons-panel">
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="alert-btn">Simple Alert</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="print-name">Print My Name</button>
              </div>
            </div>
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="print-cities">Print All Cities</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="add-city">Add Your City In List</button>
              </div>
            </div>
            <div class="btn-row">
              <button class="red-btn" id="table">Generate Table</button>
            </div>
          </div>
        </div>
        <div class="col-right">
          <p class="section-title">Output / Result</p>
          <div class="output-panel" id="output" style="display: flex; flex-direction: column; justify-content: center; align-items: center;"></div>
        </div>
      </div>

      <div class="clear-output-wrap">
        <button id="output-clear">Clear Output</button>
      </div>
    </main>

    <footer>&copy; 2026 | Designed By Anas| All Rights Reserved</footer>

    <script src="script.js"></script>
  </body>
</html>
