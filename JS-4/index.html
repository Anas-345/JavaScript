<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignments – Chapter 21-25</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="nav-left">
        <span class="brand">Assignments</span>
        <span class="chapter-label">Chapter 21-25</span>
      </div>
      <div class="search-wrap">
        <input type="text" placeholder="Search" />
        <button>Search</button>
      </div>
    </nav>

    <main>
      <h1 class="page-title">
        Chapter # 21 - 25 | Strings & It's Methods
      </h1>
      <hr class="divider" />

      <div class="row">
        <div class="col-left">
          <p class="section-title">Input</p>
          <div class="input-panel">
            <div class="input-field">
              <input type="text" placeholder="Type your text here" id="input" />
              <button class="clear-btn" id="input-clear">Clear</button>
            </div>
          </div>
        </div>
        <div class="col-right">
          <p class="section-title">Original String</p>
          <div class="string-panel" id="original-string">
            <p>
                I love my country Pakistan.
            </p>
            <p>
                I like my city Faisalabad.
            </p>
            <p>
                I love my Homeland.
            </p>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-left">
          <p class="section-title">Buttons</p>
          <div class="buttons-panel">
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="lower-case">Convert to LowerCase</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="upper-case">Convert to UpperCase</button>
              </div>
            </div>
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="capitalize">Convert to Capitalize</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="format">Better Formating</button>
              </div>
            </div>
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="print-cities">Print All Cities</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="add-city">Add your City in List</button>
              </div>
            </div>
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="check-city">Check your City in List</button>
              </div>
              <div class="btn-half">
                <button class="red-btn" id="find-word">Find this Word</button>
              </div>
            </div>
            <div class="btn-row">
              <div class="btn-half">
                <button class="red-btn" id="replace-word">Replace this Word</button>
              </div>
            </div>
          </div>
        </div>
        <div class="col-right">
          <p class="section-title">Output / Result</p>
          <div class="output-panel" id="output" style="display: flex; flex-direction: column; justify-content: center; align-items: left;"></div>
        </div>
      </div>

      <div class="clear-output-wrap">
        <button id="output-clear">Clear Output</button>
      </div>
    </main>

    <footer>&copy; 2026 | Designed By Anas| All Rights Reserved</footer>

    <script src="script.js"></script>
  </body>
</html>
